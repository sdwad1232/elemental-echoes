<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
<radialGradient id="orb" cx="44%" cy="38%" r="56%">
      <stop offset="0%" stop-color="#F9CB42"/>
      <stop offset="40%" stop-color="#EF8B2C"/>
      <stop offset="100%" stop-color="#6b1f05"/>
    </radialGradient>
  </defs>



  <!-- Four element quadrant fills -->
  <!-- Fire (top-right) -->
  <path d="M32,32 L32,6 A26,26 0 0,1 58,32 Z" fill="#C04828" opacity="0.75"/>
  <!-- Air (top-left) -->
  <path d="M32,32 L6,32 A26,26 0 0,1 32,6 Z" fill="#534AB7" opacity="0.75"/>
  <!-- Earth (bottom-right) -->
  <path d="M32,32 L58,32 A26,26 0 0,1 32,58 Z" fill="#3B6D11" opacity="0.75"/>
  <!-- Water (bottom-left) -->
  <path d="M32,32 L32,58 A26,26 0 0,1 6,32 Z" fill="#185FA5" opacity="0.75"/>

  <!-- Thin dividers -->
  <line x1="32" y1="6" x2="32" y2="58" stroke="#0a0604" stroke-width="1.2" opacity="0.9"/>
  <line x1="6" y1="32" x2="58" y2="32" stroke="#0a0604" stroke-width="1.2" opacity="0.9"/>

  <!-- Outer ring -->
  <circle cx="32" cy="32" r="26" fill="none" stroke="#EF9F27" stroke-width="0.8" opacity="0.5"/>

  <!-- Center orb -->
  <circle cx="32" cy="32" r="10" fill="#0f0a02"/>
  <circle cx="32" cy="32" r="10" fill="url(#orb)" opacity="0.9"/>
  <ellipse cx="29" cy="28" rx="3.5" ry="2.5" fill="white" opacity="0.2"/>
  <circle cx="32" cy="32" r="10" fill="none" stroke="#F9CB42" stroke-width="0.8" opacity="0.7"/>

  <!-- Center star -->
  <polygon points="32,27.5 33.2,31 32,34.5 30.8,31" fill="#FCDE5A" opacity="0.95"/>
  <polygon points="27.5,32 31,30.8 34.5,32 31,33.2" fill="#FCDE5A" opacity="0.95"/>
  <circle cx="32" cy="32" r="1.5" fill="#fff" opacity="0.9"/>
</svg>
